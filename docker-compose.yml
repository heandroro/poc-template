services:

  # ─── Relational DB ───────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: poc-template-postgres
    environment:
      POSTGRES_DB: poc_template
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d poc_template"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
